{% include base_path %}

<div class="masthead">
  <div class="masthead__inner-wrap">
    <div class="masthead__menu">
      <nav id="site-nav" class="greedy-nav">
        <button class="greedy-nav__toggle" type="button" aria-label="Toggle navigation menu">
          <span class="navicon" aria-hidden="true"></span>
          <span class="greedy-nav__label">Menu</span>
        </button>
        <ul class="visible-links">
          <li class="masthead__menu-item masthead__menu-item--lg"><a href="{{ '/' | relative_url }}">{{ site.title }}</a></li>
          {% for link in site.data.navigation.main %}
            {% if link.url contains 'http' %}
              {% assign nav_url = link.url %}
              {% else %}
              {% assign nav_url = link.url | relative_url %}
            {% endif %}
            <li class="masthead__menu-item"><a href="{{ nav_url }}">{{ link.title }}</a></li>
          {% endfor %}
        </ul>
        <ul class="hidden-links hidden"></ul>
      </nav>
    </div>
  </div>
</div>
